<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="statusMessage"></div>

    <div id="loadingOverlay">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
    </div>

    <div id="header-placeholder"></div>

    <div id="mainContainer" class="container py-4 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-1 text-dark">Staff Directory</h4>
                <p class="text-muted small mb-0">Manage permissions and view staff profiles.</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark fw-bold" data-bs-toggle="modal" data-bs-target="#leaveConfigModal">
                    <i data-lucide="settings" class="size-4 me-2"></i>Leave Rules
                </button>
                <button class="btn btn-warning text-dark fw-bold shadow-sm" onclick="window.recalculateAllBalances()">
                    <i data-lucide="refresh-cw" class="size-4 me-2"></i>Recalculate Balances
                </button>
                <a href="staff_register.html" class="btn btn-primary fw-bold shadow-sm"><i data-lucide="plus" class="size-4 me-2"></i>Add New</a>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 col-lg-4">
                <div class="input-group">
                    <span class="input-group-text bg-white text-muted border-end-0 border-primary"><i data-lucide="search" class="size-4"></i></span>
                    <input type="text" id="searchInput" class="form-control border-start-0 border-primary" placeholder="Search staff..." onkeyup="window.updateSearch(this.value)">
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-muted">
                            <tr>
                                <th class="ps-4">Emp Code</th>
                                <th>Full Name</th>
                                <th>Department</th>
                                <th>Leave Balance</th> 
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold">Review Request</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-info small border-info">
                        <i data-lucide="info" class="size-4 me-1"></i>Approval unlocks profile for 5 mins.
                    </div>
                    <div class="mb-2">
                        <label class="small text-muted fw-bold">REQUESTER</label>
                        <div id="modalRequesterName" class="fw-bold text-dark"></div>
                        <small id="modalRequesterId" class="text-muted"></small>
                    </div>
                    <div>
                        <label class="small text-muted fw-bold">REASON</label>
                        <div id="modalRequestContent" class="p-2 bg-light rounded border small text-dark"></div>
                    </div>
                    <input type="hidden" id="hiddenRequestId">
                    <input type="hidden" id="hiddenUserId">
                </div>
                <div class="modal-footer bg-light border-0">
                    <button class="btn btn-outline-danger fw-bold px-4" onclick="window.processDecision('reject')">Reject</button>
                    <button class="btn btn-success text-white fw-bold px-4 shadow-sm" onclick="window.processDecision('approve')">Approve</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="leaveConfigModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h6 class="modal-title fw-bold"><i data-lucide="settings" class="size-4 me-2"></i>Leave Rules Setup</h6>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <ul class="nav nav-tabs mb-3" role="tablist">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#annual-pane">🏖️ Annual</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#medical-pane">🏥 Medical</button></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="annual-pane">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="small fw-bold text-muted">Tier Setup (By Years of Service)</span>
                                <button class="btn btn-sm btn-outline-primary fw-bold" onclick="window.addRuleRow('annual')">+ Add Tier</button>
                            </div>
                            <div id="annualRulesContainer"></div>
                        </div>
                        <div class="tab-pane fade" id="medical-pane">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="small fw-bold text-muted">Tier Setup (By Years of Service)</span>
                                <button class="btn btn-sm btn-outline-danger fw-bold" onclick="window.addRuleRow('medical')">+ Add Tier</button>
                            </div>
                            <div id="medicalRulesContainer"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button class="btn btn-primary w-100 fw-bold shadow-sm" onclick="window.saveLeaveRules()">Save Rules</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";
        import { requireAdmin } from "./auth-guard.js";
        
        import { initManageStaffApp } from "./manage-staff-app.js"; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        requireAdmin(app, db, async (user) => {
            await initManageStaffApp();
        });
    </script>
</body>
</html>
