<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HRIS Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card login-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Admin Portal</h2>
                <p class="text-muted">Please sign in to continue</p>
            </div>
            
            <form id="loginForm" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                    <div class="invalid-feedback">
                        Please enter a valid email address.
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <div class="invalid-feedback">
                        Please enter your password.
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2">
                    <span id="btnText">Sign In</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
            </form>

            <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert"></div>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        /**
         * Monitor authentication state
         * Automatically redirects if user is already signed in
         */
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'home.html';
            }
        });

        /**
         * Handle Login Submission
         * Includes UI validation and Firebase error handling
         */
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            e.stopPropagation();

            // 1. Reset error messages
            errorMessage.classList.add('d-none');

            // 2. Perform Bootstrap Form Validation
            // This checks strictly for valid email format and non-empty fields
            if (!loginForm.checkValidity()) {
                loginForm.classList.add('was-validated'); // Triggers the red/green UI cues
                return; // Stop execution if format is invalid
            }
            
            // If valid, apply class to show valid state
            loginForm.classList.add('was-validated');

            // 3. UI Loading State (Disable button, show spinner)
            setLoading(true);

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Attempt Firebase Sign In
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect is handled by onAuthStateChanged observer above
            } catch (error) {
                // 4. Handle Specific Firebase Errors
                console.error("Login Error:", error.code); // Log code for debugging
                
                let msg = "Login failed. Please check your credentials.";
                
                // Map Firebase error codes to user-friendly messages
                switch (error.code) {
                    case 'auth/invalid-email':
                        msg = "The email address is badly formatted.";
                        break;
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                    case 'auth/invalid-credential': // New Firebase standardized error
                        msg = "Incorrect email or password.";
                        break;
                    case 'auth/too-many-requests':
                        msg = "Too many failed attempts. Access temporarily disabled.";
                        break;
                    case 'auth/network-request-failed':
                        msg = "Network error. Please check your internet connection.";
                        break;
                }

                showError(msg);
                setLoading(false); // Re-enable button
            }
        });

        /**
         * Helper: Toggle Button Loading State
         */
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('d-none');
                btnSpinner.classList.remove('d-none');
            } else {
                btnText.classList.remove('d-none');
                btnSpinner.classList.add('d-none');
            }
        }

        /**
         * Helper: Display Error Alert
         */
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('d-none');
        }
    </script>
</body>
</html>
