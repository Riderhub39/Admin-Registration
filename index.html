<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HRIS Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card login-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Admin Portal</h2>
                <p class="text-muted">Please sign in to continue</p>
            </div>
            
            <div id="errorMessage" class="alert alert-danger d-none text-center" style="font-size: 0.85rem;"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold" id="submitBtn">
                    <span id="btnText">Sign In</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        // 统一导入配置文件
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorMessage = document.getElementById('errorMessage');

        // 🟢 逆向守卫：如果用户已经登录，且是管理员，直接跳过登录页进入 home
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists() && docSnap.data().role === 'admin') {
                        window.location.replace("home.html");
                    } else {
                        await signOut(auth); // 不是管理员，强制登出
                        showError("Access Denied. Admins only.");
                    }
                } catch (e) {
                    await signOut(auth);
                    showError("Error verifying permissions.");
                }
            }
        });

        // 登录请求
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('d-none');
            setLoading(true);

            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                // 成功后，onAuthStateChanged 会自动触发并重定向
            } catch (error) {
                let msg = "An error occurred. Please try again.";
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                    case 'auth/invalid-credential':
                        msg = "Incorrect email or password.";
                        break;
                    case 'auth/too-many-requests':
                        msg = "Too many failed attempts. Access temporarily disabled.";
                        break;
                }
                showError(msg);
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('d-none');
                btnSpinner.classList.remove('d-none');
            } else {
                btnText.classList.remove('d-none');
                btnSpinner.classList.add('d-none');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('d-none');
        }
    </script>
</body>
</html>
