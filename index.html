<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HRIS Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="card login-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Admin Portal</h2>
                <p class="text-muted">Please sign in to continue</p>
            </div>
            
            <div id="errorMessage" class="alert alert-danger d-none text-center" style="font-size: 0.85rem;"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Email address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold" id="submitBtn">
                    <span id="btnText">Sign In</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="index-app.js"></script>
</body>
</html>
