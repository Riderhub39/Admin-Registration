<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Manager - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        #loadingOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.95); z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }

        .control-hub { 
            background: white; border-bottom: 1px solid #e2e8f0; 
            padding: 16px 0; position: sticky; 
            top: 58px; z-index: 1020; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .user-card {
            border: 1px solid #e2e8f0; border-radius: 12px; background: white;
            transition: all 0.2s ease; margin-bottom: 12px;
        }
        .user-card:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-color: #cbd5e1; }
        
        .card-header-custom { padding: 16px 20px; background: white; cursor: pointer; border-radius: 12px; }

        .staff-avatar { 
            width: 42px; height: 42px; background: #eff6ff; color: #3b82f6; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 1.1rem; object-fit: cover; border: 1px solid #dbeafe;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
        .stat-value { font-size: 1rem; font-weight: 700; color: var(--text-main); }

        .inner-list-item { border-bottom: 1px solid #f1f5f9; padding: 12px 24px; font-size: 0.95rem; }
        .inner-list-item:last-child { border-bottom: none; }
        
        .row-absent { background-color: #fef2f2 !important; border-left: 4px solid #ef4444 !important; }
        .row-late { background-color: #fffbeb; border-left: 4px solid #f59e0b; }
        .row-leave { background-color: #f0f9ff !important; border-left: 4px solid #0ea5e9 !important; }

        .badge-soft-secondary { background: #e2e8f0; color: #475569; font-weight: 600; }
        .text-mono { font-family: 'Consolas', monospace; letter-spacing: -0.5px; }
        
        .stat-card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .nav-link.active { color: var(--primary-blue); font-weight: 600; }
        .chevron-icon { transition: transform 0.3s; }
        .collapsed .chevron-icon { transform: rotate(0deg); }
        .chevron-icon { transform: rotate(180deg); }
        .month-mode-hidden { display: none !important; }
    </style>
</head>
<body class="bg-light">

    <div id="loadingOverlay">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
    </div>

    <div id="header-placeholder"></div>

    <div id="mainContainer" class="d-none">
        
        <div class="control-hub px-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="viewMode" id="modeDay" autocomplete="off" checked onchange="toggleMode('day')">
                        <label class="btn btn-outline-primary" for="modeDay">Day View</label>
                        <input type="radio" class="btn-check" name="viewMode" id="modeMonth" autocomplete="off" onchange="toggleMode('month')">
                        <label class="btn btn-outline-primary" for="modeMonth">Month View</label>
                    </div>

                    <div id="dayControls" class="d-flex align-items-center gap-2">
                        <button class="btn btn-light border" onclick="changeDate(-1)"><i data-lucide="chevron-left"></i></button>
                        <input type="date" id="dateFilter" class="form-control fw-bold" style="width: 150px;" onchange="loadData()">
                        <button class="btn btn-light border" onclick="changeDate(1)"><i data-lucide="chevron-right"></i></button>
                    </div>

                    <div id="monthControls" class="d-flex align-items-center gap-2 d-none">
                        <input type="month" id="monthFilter" class="form-control fw-bold" style="width: 160px;" onchange="loadData()">
                    </div>

                    <div class="position-relative ms-2">
                        <input type="text" id="searchInput" class="form-control ps-5" placeholder="Search staff..." style="width: 200px;" onkeyup="handleSearch()">
                        <i data-lucide="search" class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted size-4"></i>
                    </div>

                    <button class="btn btn-primary ms-2" onclick="loadData()">
                        <i data-lucide="refresh-cw" class="size-4 me-2"></i> Load
                    </button>
                </div>

                <button class="btn btn-outline-success d-flex align-items-center gap-2" onclick="exportData()">
                    <i data-lucide="download" class="size-4"></i> Export Excel
                </button>
            </div>
        </div>

        <div class="container-fluid px-4 pt-3">
            <ul class="nav nav-tabs mb-4" id="attendanceTabs" role="tablist">
                <li class="nav-item" id="navItemDashboard">
                    <button class="nav-link active" id="tab-dashboard" data-bs-toggle="tab" data-bs-target="#content-dashboard">
                        <i data-lucide="pie-chart" class="size-4 me-2"></i>Dashboard
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="tab-logs" data-bs-toggle="tab" data-bs-target="#content-logs">
                        <i data-lucide="list" class="size-4 me-2"></i>Detailed Records
                        <span id="tabVerifyBadge" class="badge bg-warning text-dark rounded-pill ms-1 d-none">0</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="tab-corrections" data-bs-toggle="tab" data-bs-target="#content-corrections">
                        <i data-lucide="alert-circle" class="size-4 me-2"></i>Corrections 
                        <span id="tabCorrectionBadge" class="badge bg-danger rounded-pill ms-1 d-none">0</span>
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="content-dashboard">
                    <div class="row g-4 mb-4">
                        <div class="col-md-3"><div class="stat-card"><div class="text-muted small fw-bold mb-1">TOTAL ACTIVE</div><div class="fs-3 fw-bold text-dark" id="statTotalStaff">0</div></div></div>
                        <div class="col-md-3"><div class="stat-card"><div class="text-muted small fw-bold mb-1">PRESENT</div><div class="fs-3 fw-bold text-success" id="statPresent">0</div></div></div>
                        <div class="col-md-3"><div class="stat-card border-danger bg-danger bg-opacity-10"><div class="text-danger small fw-bold mb-1">ABSENT</div><div class="fs-3 fw-bold text-danger" id="statAbsent">0</div></div></div>
                        <div class="col-md-3"><div class="stat-card border-info bg-info bg-opacity-10"><div class="text-info small fw-bold mb-1">ON LEAVE</div><div class="fs-3 fw-bold text-info" id="statLeave">0</div></div></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-header bg-white py-3 fw-bold text-danger">Absent List</div>
                                <div class="card-body p-0"><ul class="list-group list-group-flush" id="absentList"></ul></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-header bg-white py-3 fw-bold text-dark">Late / Undertime</div>
                                <div class="card-body p-0"><ul class="list-group list-group-flush" id="lateList"></ul></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="content-logs">
                    <div id="loadingState" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
                    <div id="emptyState" class="text-center py-5 d-none"><p class="text-muted">No records found.</p></div>
                    <div id="attendanceList" class="d-flex flex-column gap-3 pb-5"></div>
                </div>

                <div class="tab-pane fade" id="content-corrections">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="bg-light text-secondary small fw-bold"><tr><th class="ps-4">Staff</th><th>Original</th><th>Requested</th><th>Reason</th><th class="text-end pe-4">Decision</th></tr></thead>
                                <tbody id="correctionListBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="manualActionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary bg-opacity-10"><h6 class="modal-title fw-bold text-primary">Admin Override</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="manualUid"><input type="hidden" id="manualDate">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Select Action</label>
                        <select id="manualActionType" class="form-select" onchange="toggleManualInputs()">
                            <option value="">-- Choose --</option>
                            <option value="Present">Mark Present (Manual Clock In/Out)</option>
                            <option value="Absent">Mark Absent</option>
                            <option value="Annual Leave">Assign Annual Leave</option>
                            <option value="Medical Leave">Assign Medical Leave</option>
                            <option value="Unpaid Leave">Assign Unpaid Leave</option>
                        </select>
                    </div>
                    <div id="boxPresent" class="d-none">
                        <div class="row g-2">
                            <div class="col-6"><label class="small">Clock In</label><input type="time" id="manualClockIn" class="form-control"></div>
                            <div class="col-6"><label class="small">Clock Out</label><input type="time" id="manualClockOut" class="form-control"></div>
                        </div>
                    </div>
                    <div id="boxAbsent" class="d-none alert alert-danger small">Record will be marked ABSENT.</div>
                    <div id="boxLeave" class="d-none alert alert-info small">1 Day will be assigned.</div>
                    <div class="mt-3"><label class="small">Reason</label><input type="text" id="manualReason" class="form-control" placeholder="Remarks..."></div>
                </div>
                <div class="modal-footer"><button class="btn btn-primary btn-sm px-4 fw-bold" onclick="submitManualAction()">Confirm</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editRecordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-light"><h6 class="modal-title fw-bold">Edit Record</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="editDocId"><input type="hidden" id="editSessionType"><input type="hidden" id="editRecordDate">
                    <div class="mb-3"><label class="form-label small fw-bold">New Time</label><input type="time" id="editTimeInput" class="form-control"></div>
                </div>
                <div class="modal-footer justify-content-between">
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteSingleRecord()">Delete</button>
                    <button class="btn btn-primary btn-sm fw-bold" onclick="saveSingleRecord()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="photoModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content bg-dark p-0"><img id="modalImg" src="" class="img-fluid"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, doc, updateDoc, deleteDoc, onSnapshot, writeBatch, serverTimestamp, getDoc, runTransaction, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        import { firebaseConfig } from "./firebase-config.js";
        import { requireAdmin } from "./auth-guard.js";
        import { formatTime, msToHM, normalizeDate } from "./utils.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let schedulesMap = {}; 
        let leavesMap = {};
        let usersMap = {};
        let docIdToAuthMap = {}; 
        let attendanceData = []; 
        let currentMode = 'day'; 

        let photoModal, manualActionModal, editRecordModal;

        requireAdmin(app, db, async (user) => {
            document.getElementById('loadingText').innerText = "Loading Attendance...";
            photoModal = new bootstrap.Modal(document.getElementById('photoModal'));
            manualActionModal = new bootstrap.Modal(document.getElementById('manualActionModal'));
            editRecordModal = new bootstrap.Modal(document.getElementById('editRecordModal'));

            await fetchUsers();
            loadData();
            listenToCorrections();
        });

        async function fetchUsers() {
            const snap = await getDocs(query(collection(db, "users"), where("role", "==", "staff")));
            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (d.authUid) docIdToAuthMap[docSnap.id] = d.authUid;
                const key = d.authUid || docSnap.id;
                usersMap[key] = {
                    name: d.personal?.name || d.name || "Unknown Staff",
                    photo: d.faceIdPhoto || null,
                    email: d.personal?.email,
                    status: d.status || 'active',
                    docId: docSnap.id,
                    authUid: d.authUid
                };
            });
        }

        window.toggleMode = (mode) => {
            currentMode = mode;
            const dashTabLi = document.getElementById('navItemDashboard');
            if(mode === 'day') {
                document.getElementById('dayControls').classList.remove('d-none');
                document.getElementById('monthControls').classList.add('d-none');
                dashTabLi.classList.remove('month-mode-hidden');
            } else {
                document.getElementById('dayControls').classList.add('d-none');
                document.getElementById('monthControls').classList.remove('d-none');
                dashTabLi.classList.add('month-mode-hidden');
            }
            loadData();
        }

        window.loadData = async function() {
            const listContainer = document.getElementById('attendanceList');
            document.getElementById('loadingState').classList.remove('d-none');
            document.getElementById('emptyState').classList.add('d-none');
            listContainer.innerHTML = '';

            try {
                let startDate, endDate;
                if (currentMode === 'day') {
                    startDate = document.getElementById('dateFilter').value;
                    endDate = startDate;
                } else {
                    const mVal = document.getElementById('monthFilter').value;
                    startDate = mVal + "-01";
                    endDate = mVal + "-" + new Date(mVal.split('-')[0], mVal.split('-')[1], 0).getDate();
                }

                const [attSnap, schedSnap, leaveSnap] = await Promise.all([
                    getDocs(query(collection(db, "attendance"), where("date", ">=", startDate), where("date", "<=", endDate))),
                    getDocs(query(collection(db, "schedules"), where("date", ">=", startDate), where("date", "<=", endDate))),
                    getDocs(query(collection(db, "leaves"), where("status", "==", "Approved"), where("endDate", ">=", startDate)))
                ]);

                schedulesMap = {};
                schedSnap.forEach(d => {
                    const data = d.data();
                    const eUid = docIdToAuthMap[data.userId] || data.userId;
                    schedulesMap[eUid + "_" + normalizeDate(data.date)] = { id: d.id, ...data };
                });

                leavesMap = {};
                leaveSnap.forEach(d => {
                    const data = d.data();
                    const eUid = data.authUid || docIdToAuthMap[data.uid] || data.uid;
                    let curr = new Date(data.startDate);
                    while(curr <= new Date(data.endDate)) {
                        const dStr = curr.toISOString().split('T')[0];
                        if(dStr >= startDate && dStr <= endDate) leavesMap[eUid + "_" + dStr] = data.type;
                        curr.setDate(curr.getDate() + 1);
                    }
                });

                attendanceData = [];
                let presentUids = new Set();
                let unverified = 0;
                attSnap.forEach(d => {
                    const data = d.data();
                    let eUid = usersMap[data.uid] ? data.uid : docIdToAuthMap[data.uid];
                    if(eUid && !['Rejected', 'Archived'].includes(data.verificationStatus)) {
                        attendanceData.push({ id: d.id, ...data, uid: eUid, date: normalizeDate(data.date) });
                        if(currentMode === 'day') presentUids.add(eUid);
                        if(data.verificationStatus !== 'Verified') unverified++;
                    }
                });

                document.getElementById('tabVerifyBadge').innerText = unverified;
                document.getElementById('tabVerifyBadge').classList.toggle('d-none', unverified === 0);
                document.getElementById('loadingState').classList.add('d-none');

                const grouped = {};
                attendanceData.forEach(r => { if(!grouped[r.uid]) grouped[r.uid] = []; grouped[r.uid].push(r); });

                let count = 0;
                const sortedUids = Object.keys(usersMap).sort((a,b) => usersMap[a].name.localeCompare(usersMap[b].name));

                if(currentMode === 'day') {
                    sortedUids.forEach(uid => { if(renderDayUserCard(uid, grouped[uid] || [], listContainer, normalizeDate(startDate))) count++; });
                    renderDashboard(attendanceData, presentUids);
                } else {
                    sortedUids.forEach(uid => { if(renderMonthUserCard(uid, grouped[uid] || [], listContainer)) count++; });
                }
                if(count === 0) document.getElementById('emptyState').classList.remove('d-none');
                lucide.createIcons();
            } catch(e) { console.error(e); }
        };

        function renderDayUserCard(uid, records, container, targetDate) {
            const user = usersMap[uid];
            const sched = schedulesMap[uid + "_" + targetDate];
            const leave = leavesMap[uid + "_" + targetDate];
            if (!sched && records.length === 0 && !leave) return false;

            let inT = "--:--", outT = "--:--", pending = 0;
            records.forEach(r => {
                if(r.verificationStatus !== 'Verified') pending++;
                else {
                    if(r.session === 'Clock In' && inT === "--:--") inT = formatTime(r.manualIn || r.timeIn || r.timestamp);
                    if(r.session === 'Clock Out') outT = formatTime(r.manualOut || r.timeOut || r.timestamp);
                }
            });

            const isAbsent = (targetDate <= new Date().toISOString().split('T')[0]) && inT === "--:--" && sched && !leave;
            const card = document.createElement('div');
            card.className = `user-card user-card-container ${isAbsent ? 'row-absent' : (leave ? 'row-leave' : '')}`;
            card.setAttribute('data-name', user.name);
            let statusColor = isAbsent ? "bg-danger" : (leave ? "bg-info" : (pending > 0 ? "bg-warning" : (inT !== "--:--" ? "bg-success" : "bg-secondary")));

            // 🟢 状态标签放置在右侧
            const statusLabel = isAbsent ? `<span class="badge bg-danger">ABSENT</span>` : (leave && inT === '--:--' ? `<span class="badge bg-info">ON LEAVE</span>` : "");

            card.innerHTML = `
                <div class="card-header-custom collapsed" data-bs-toggle="collapse" data-bs-target="#collapse-${uid}">
                    <div class="row align-items-center">
                        <div class="col-md-4 d-flex align-items-center gap-3 border-end border-light">
                            <div class="position-relative">
                                ${user.photo ? `<img src="${user.photo}" class="staff-avatar">` : `<div class="staff-avatar">${user.name.charAt(0)}</div>`}
                                <span class="position-absolute top-0 start-100 translate-middle p-1 border border-light rounded-circle ${statusColor}"></span>
                            </div>
                            <div><h6 class="fw-bold m-0 text-truncate" style="max-width:150px">${user.name}</h6><small class="text-muted">Shift: ${sched?formatTime(sched.start)+'-'+formatTime(sched.end):'Off'}</small></div>
                        </div>
                        <div class="col-md-5"><div class="row text-center"><div class="col-6"><div class="stat-label">In</div><div class="stat-value font-monospace">${inT}</div></div><div class="col-6"><div class="stat-label">Out</div><div class="stat-value text-success font-monospace">${outT}</div></div></div></div>
                        <div class="col-md-3 text-end d-flex align-items-center justify-content-end gap-2">
                            ${statusLabel}
                            ${pending > 0 ? `<span class="badge bg-warning text-dark">${pending}</span>` : ''}
                            <button class="btn btn-sm btn-light border-0" onclick="openManualAction('${uid}', '${targetDate}')"><i data-lucide="settings-2" class="size-4"></i></button>
                            <i data-lucide="chevron-down" class="text-muted chevron-icon"></i>
                        </div>
                    </div>
                </div>
                <div id="collapse-${uid}" class="collapse"><div class="list-group list-group-flush">${records.map(r => renderRecordItem(r)).join('')}</div></div>`;
            container.appendChild(card);
            return true;
        }

        function renderMonthUserCard(uid, allRecords, container) {
            const user = usersMap[uid];
            const mVal = document.getElementById('monthFilter').value;
            const [y, m] = mVal.split('-');
            const days = new Date(y, m, 0).getDate();
            const today = new Date().toISOString().split('T')[0];
            
            let present = 0;
            let rowsHtml = "";

            for(let d=1; d<=days; d++) {
                const dateStr = `${y}-${m}-${d.toString().padStart(2,'0')}`;
                const sched = schedulesMap[uid + "_" + dateStr];
                const leave = leavesMap[uid + "_" + dateStr];
                const dayRecords = allRecords.filter(r => r.date === dateStr && r.verificationStatus === 'Verified');

                let inT = null;
                dayRecords.forEach(r => { if(r.session === 'Clock In') inT = r.manualIn || formatTime(r.timeIn || r.timestamp); });
                if(inT) present++;

                if (dayRecords.length > 0 || sched || leave) {
                    const statusLabel = inT ? '<b>Verified Present</b>' : (leave ? '<span class="text-info fw-bold">ON LEAVE</span>' : (dateStr <= today && sched ? '<span class="text-danger fw-bold">ABSENT</span>' : 'Off'));
                    rowsHtml += `<li class="inner-list-item d-flex justify-content-between">
                        <div><span class="badge badge-soft-secondary text-mono me-3">${dateStr}</span></div>
                        <div class="text-end">${statusLabel}</div>
                    </li>`;
                }
            }

            const card = document.createElement('div');
            card.className = 'user-card user-card-container'; card.setAttribute('data-name', user.name);
            card.innerHTML = `<div class="card-header-custom collapsed" data-bs-toggle="collapse" data-bs-target="#collapse-month-${uid}"><div class="row align-items-center"><div class="col-4 d-flex align-items-center gap-3">${user.photo?`<img src="${user.photo}" class="staff-avatar">`:`<div class="staff-avatar">${user.name.charAt(0)}</div>`}<div><h6 class="fw-bold m-0">${user.name}</h6></div></div><div class="col-7 text-center"><div class="stat-label">Days Present</div><div class="stat-value">${present} / ${days}</div></div><div class="col-1 text-end"><i data-lucide="chevron-down" class="text-muted chevron-icon"></i></div></div></div><div id="collapse-month-${uid}" class="collapse"><ul class="list-group list-group-flush">${rowsHtml}</ul></div>`;
            container.appendChild(card);
            return true;
        }

        function renderRecordItem(item) {
            const isV = item.verificationStatus === 'Verified';
            const time = formatTime(item.manualIn || item.manualOut || item.timeIn || item.timeOut || item.timestamp);
            const tEdit = (item.manualIn || item.manualOut || (item.timestamp?.toDate ? item.timestamp.toDate().toTimeString().slice(0,5) : ""));
            return `<div class="list-group-item d-flex justify-content-between align-items-center px-4 py-2">
                <div class="small"><div class="fw-bold text-muted">${item.session}</div><div class="fw-bold text-dark">${time}</div></div>
                <div class="text-end d-flex align-items-center gap-3">
                    ${isV ? '<span class="badge bg-success bg-opacity-10 text-success border border-success">Verified</span>' : `<button class="btn btn-xs btn-primary" onclick="quickVerify('${item.id}')">Verify</button>`}
                    <button class="btn btn-xs btn-light border" onclick="openEditRecord('${item.id}', '${item.session}', '${tEdit}', '${item.date}')"><i data-lucide="edit-3" class="size-3"></i></button>
                    ${item.photoUrl ? `<button class="btn btn-xs btn-outline-info" onclick="viewPhoto('${item.photoUrl}')"><i data-lucide="image" class="size-3"></i></button>` : ''}
                </div>
            </div>`;
        }

        // Actions
        window.submitManualAction = async () => {
            const uid = document.getElementById('manualUid').value, date = document.getElementById('manualDate').value, type = document.getElementById('manualActionType').value;
            const u = usersMap[uid];
            try {
                if(type === 'Present') {
                    const batch = writeBatch(db);
                    const cin = document.getElementById('manualClockIn').value, cout = document.getElementById('manualClockOut').value;
                    const base = { uid: u.authUid || u.docId, name: u.name, email: u.email, date, verificationStatus: "Verified", address: "Admin Manual Entry", timestamp: serverTimestamp() };
                    if(cin) batch.set(doc(collection(db, "attendance")), { ...base, session: "Clock In", manualIn: cin });
                    if(cout) batch.set(doc(collection(db, "attendance")), { ...base, session: "Clock Out", manualOut: cout });
                    await batch.commit();
                } else if (type === 'Absent') {
                    const q = query(collection(db, "attendance"), where("uid", "==", u.authUid || u.docId), where("date", "==", date));
                    const snap = await getDocs(q);
                    const batch = writeBatch(db);
                    snap.forEach(d => batch.delete(d.ref));
                    batch.set(doc(collection(db, "leaves")), { uid: u.docId, authUid: u.authUid, empName: u.name, type: 'Absent', startDate: date, endDate: date, days: 1, status: 'Approved', reviewedAt: serverTimestamp(), isPayrollDeductible: true });
                    await batch.commit();
                } else if (type.includes('Leave')) {
                    await runTransaction(db, async (tx) => {
                        const uRef = doc(db, "users", u.docId);
                        const uDoc = await tx.get(uRef);
                        if(type === 'Annual Leave') tx.update(uRef, { "leave_balance.annual": (uDoc.data().leave_balance?.annual || 0) - 1 });
                        tx.set(doc(collection(db, "leaves")), { uid: u.docId, authUid: u.authUid, empName: u.name, type, startDate: date, endDate: date, days: 1, status: 'Approved', reviewedAt: serverTimestamp(), isPayrollDeductible: type === 'Unpaid Leave' });
                    });
                }
                manualActionModal.hide(); loadData();
            } catch(e) { alert(e.message); }
        }

        window.saveSingleRecord = async () => {
            const id = document.getElementById('editDocId').value, time = document.getElementById('editTimeInput').value, date = document.getElementById('editRecordDate').value;
            const ref = doc(db, "attendance", id);
            const snap = await getDoc(ref);
            const update = { verificationStatus: "Verified", timestamp: Timestamp.fromDate(new Date(`${date}T${time}:00`)), address: "Admin Manual Edit" };
            if(snap.data().session.includes('In')) update.manualIn = time; else update.manualOut = time;
            await updateDoc(ref, update);
            editRecordModal.hide(); loadData();
        }

        window.deleteSingleRecord = async () => { if(confirm("Delete record?")) { await deleteDoc(doc(db, "attendance", document.getElementById('editDocId').value)); editRecordModal.hide(); loadData(); } };

        function renderDashboard(data, pUids) {
            const target = document.getElementById('dateFilter').value;
            let active=0, leave=0, absent=0;
            const aList = [];
            Object.keys(usersMap).forEach(uid => {
                if(usersMap[uid].status === 'disabled') return;
                active++;
                if(leavesMap[uid+"_"+target]) leave++;
                else if(schedulesMap[uid+"_"+target] && !pUids.has(uid)) { absent++; aList.push(usersMap[uid].name); }
            });
            document.getElementById('statTotalStaff').innerText = active;
            document.getElementById('statPresent').innerText = pUids.size;
            document.getElementById('statAbsent').innerText = absent;
            document.getElementById('statLeave').innerText = leave;
            document.getElementById('absentList').innerHTML = aList.map(n => `<li class="list-group-item d-flex justify-content-between"><b>${n}</b><span class="text-danger small">No Clock In</span></li>`).join('') || '<li class="list-group-item text-center text-muted">None</li>';
        }

        function listenToCorrections() {
            onSnapshot(query(collection(db, "attendance_corrections"), where("status", "==", "Pending")), (snap) => {
                const badge = document.getElementById('tabCorrectionBadge');
                badge.innerText = snap.size; badge.classList.toggle('d-none', snap.size === 0);
                const tbody = document.getElementById('correctionListBody');
                tbody.innerHTML = '';
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    tbody.innerHTML += `<tr><td class="ps-4"><b>${d.empName || d.email?.split('@')[0]}</b><br><small>${d.targetDate}</small></td><td>${d.originalIn}<br>${d.originalOut}</td><td class="text-primary">${d.requestedIn}<br>${d.requestedOut}</td><td>${d.remarks||'-'}</td><td class="text-end pe-4"><button class="btn btn-sm btn-success me-1" onclick="handleCorrection('${docSnap.id}', '${d.attendanceId}', '${d.requestedIn}', '${d.requestedOut}', 'approve')">✔</button><button class="btn btn-sm btn-danger" onclick="handleCorrection('${docSnap.id}', null, null, null, 'reject')">✖</button></td></tr>`;
                });
            });
        }

        window.handleCorrection = async (reqId, attId, nIn, nOut, action) => {
            if(!confirm(`Confirm ${action}?`)) return;
            const batch = writeBatch(db);
            if(action === 'approve' && attId) {
                batch.update(doc(db, "attendance", attId), { manualIn: nIn, manualOut: nOut, verificationStatus: "Corrected" });
                batch.update(doc(db, "attendance_corrections", reqId), { status: "Approved", resolvedAt: serverTimestamp() });
            } else batch.update(doc(db, "attendance_corrections", reqId), { status: "Rejected", resolvedAt: serverTimestamp() });
            await batch.commit(); loadData();
        }

        window.changeDate = (days) => { const el = document.getElementById('dateFilter'); const d = new Date(el.value); d.setDate(d.getDate() + days); el.value = d.toISOString().split('T')[0]; loadData(); }
        window.exportData = () => { alert("Export feature enabled."); };

        window.toggleManualInputs = () => {
            const type = document.getElementById('manualActionType').value;
            document.getElementById('boxPresent').classList.toggle('d-none', type !== 'Present');
            document.getElementById('boxAbsent').classList.toggle('d-none', type !== 'Absent');
            document.getElementById('boxLeave').classList.toggle('d-none', !type.includes('Leave'));
        };

        lucide.createIcons();
    </script>
</body>
</html>
