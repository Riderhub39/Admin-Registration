<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Administrators - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-light">

<div id="statusMessage"></div>

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 class="fw-bold text-dark" id="loadingText">Verifying Manager Access...</h5>
</div>

<div id="header-placeholder"></div>

<div id="mainContainer" class="container py-4 d-none">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold m-0"><i data-lucide="shield-check" class="me-2 text-dark"></i>Admin Management</h4>
            <p class="text-muted small mb-0">Elevate staff roles or manage existing administrators.</p>
        </div>
        <button class="btn btn-primary fw-bold" onclick="window.openPromoteModal()">
            <i data-lucide="user-plus" class="size-4 me-2"></i>Promote New Admin
        </button>
    </div>

    <div class="row g-3" id="adminList"></div>
</div>

<div class="modal fade" id="promoteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h6 class="modal-title fw-bold">Promote Staff to Admin</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Select Staff Member</label>
                    <select id="staffSelect" class="form-select border-primary">
                        <option value="">Loading staff list...</option>
                    </select>
                </div>
                <div class="alert alert-warning small border-warning">
                    <i data-lucide="alert-triangle" class="size-4 me-1"></i>
                    <b>Warning:</b> This user will gain full access to payroll, attendance, and staff data.
                </div>
            </div>
            <div class="modal-footer bg-light border-0">
                <button class="btn btn-primary w-100 fw-bold shadow-sm" onclick="window.handlePromotion()">Confirm Promotion</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";
    import { requireAdmin } from "./auth-guard.js";
    
    import { initManageAdminsApp } from "./manage-admins-app.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    requireAdmin(app, db, async (user, userData) => {
        await initManageAdminsApp(userData);
    });
</script>
</body>
</html>
