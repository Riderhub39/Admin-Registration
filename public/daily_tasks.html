<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
</div>

<div id="header-placeholder"></div>

<div id="mainContainer" class="container py-4 d-none">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
        <div>
            <h4 class="fw-bold m-0 text-dark"><i data-lucide="clipboard-list" class="me-2 text-primary"></i>Daily Tasks</h4>
            <p class="text-muted mb-0 mt-1">View and manage daily task reports from the mobile app.</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4 py-3">Date</th>
                            <th>Sales</th>
                            <th>Account</th>
                            <th>Live</th>
                            <th>Leads</th>
                            <th>Viewers</th>
                            <th>Top View</th>
                            <th>Avg View</th>
                            <th>Boosted</th>
                            <th>Comment</th>
                            <th class="pe-4">Images</th>
                        </tr>
                    </thead>
                    <tbody id="daily-tasks-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import { firebaseConfig } from "./firebase-config.js";
    import { requireAdmin } from "./auth-guard.js";  
    import { initDailyTasksApp } from "./daily_tasks-app.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // 使用系统统一的权限守卫
    requireAdmin(app, db, async (user, userData) => {
        // 权限验证通过后，初始化页面数据
        await initDailyTasksApp(db);
    });
</script>
</body>
</html>
