<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 增加表头鼠标悬停效果 */
        .sortable {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s ease;
        }
        .sortable:hover {
            background-color: #e9ecef !important;
        }
    </style>
</head>
<body class="bg-light">

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
</div>

<div id="header-placeholder"></div>

<div id="mainContainer" class="container py-4 d-none">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
        <div>
            <h4 class="fw-bold m-0 text-dark"><i data-lucide="clipboard-list" class="me-2 text-primary"></i>Daily Tasks</h4>
            <p class="text-muted mb-0 mt-1">View, filter, and sort daily task reports.</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label class="form-label small fw-bold text-muted mb-1">Search Staff</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i data-lucide="search" class="size-4 text-muted"></i></span>
                        <input type="text" id="searchStaff" class="form-control border-start-0 ps-0" placeholder="Sales Name...">
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <label class="form-label small fw-bold text-muted mb-1">Filter by Date</label>
                    <input type="date" id="filterDate" class="form-control">
                </div>
                <div class="col-12 col-md-2 d-flex align-items-end">
                    <button id="resetBtn" class="btn btn-light border w-100"><i data-lucide="rotate-ccw" class="size-4 me-1"></i>Reset</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4 py-3 sortable" data-sort="date">Date <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="salesName">Sales <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="accountType">Account <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="liveCount">Live <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="leads">Leads <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="viewers">Viewers <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="topView">Top View <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="averageView">Avg View <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th class="sortable" data-sort="isBoosted">Boosted <i data-lucide="arrow-up-down" class="size-3 ms-1 text-muted"></i></th>
                            <th>Comment</th>
                            <th class="pe-4">Images</th>
                        </tr>
                    </thead>
                    <tbody id="daily-tasks-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import { firebaseConfig } from "./firebase-config.js";
    import { requireAdmin } from "./auth-guard.js";  
    import { initDailyTasksApp } from "./daily_tasks-app.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // 使用系统统一的权限守卫
    requireAdmin(app, db, async (user, userData) => {
        // 权限验证通过后，初始化页面数据
        await initDailyTasksApp(db);
    });
</script>
</body>
</html>
