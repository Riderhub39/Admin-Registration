<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Evidence Gallery - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
</div>

<div id="header-placeholder"></div>

<div id="mainContainer" class="container py-4 d-none">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h4 class="fw-bold m-0 text-dark"><i data-lucide="image" class="me-2 text-primary"></i>Evidence Gallery</h4>
            <div class="text-muted small mt-1">View photos grouped by Case No.</div>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <div class="input-group" style="width: 170px;">
                <button class="btn btn-outline-secondary bg-white" type="button" onclick="window.changeDate(-1)"><i data-lucide="chevron-left" class="size-4"></i></button>
                <input type="date" id="dateFilter" class="form-control text-center text-sm px-1" onchange="window.loadEvidence()">
                <button class="btn btn-outline-secondary bg-white" type="button" onclick="window.changeDate(1)"><i data-lucide="chevron-right" class="size-4"></i></button>
            </div>
            
            <div class="input-group shadow-sm" style="width: 250px;">
                <span class="input-group-text bg-white border-end-0"><i data-lucide="search" class="size-4 text-muted"></i></span>
                <input type="text" id="searchFilter" class="form-control border-start-0 ps-0" placeholder="Search Case No / Client..." onkeyup="window.loadEvidence()">
            </div>
        </div>
    </div>

    <div id="evidenceList"></div>
</div>

<div class="modal fade" id="imageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0 text-center">
                <img id="modalFullImage" src="" class="img-fluid rounded-top shadow-lg" style="max-height: 75vh;">
                <div class="bg-white p-4 rounded-bottom mt-0 text-start shadow">
                    <h5 class="fw-bold mb-2 text-dark" id="modalCaseInfo">-</h5>
                    <div class="d-flex justify-content-between align-items-end text-muted">
                        <div>
                            <div id="modalStaffName" class="fw-bold text-primary mb-1">-</div>
                            <div id="modalTimeLocation" class="small lh-sm">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    import { firebaseConfig } from "./firebase-config.js";
    import { requireAdmin } from "./auth-guard.js";
    import { initEvidenceGalleryApp } from "./evidence-gallery-app.js";
    
    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    // 验证管理员身份并启动 App
    requireAdmin(auth, db).then(user => {
        initEvidenceGalleryApp();
    }).catch((e) => {
        console.error("Auth Error:", e);
        window.location.href = "login.html";
    });
</script>

</body>
</html>
