<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Evidence Gallery - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
</div>

<div id="header-placeholder"></div>

<div id="mainContainer" class="container py-4 d-none">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h4 class="fw-bold m-0 text-dark"><i data-lucide="image" class="me-2 text-primary"></i>Evidence Gallery</h4>
            <div class="text-muted small">View photos grouped by Case No.</div>
        </div>

        <div class="d-flex gap-2 align-items-center flex-wrap">
            <button class="btn btn-outline-secondary bg-white shadow-sm" onclick="window.changeDate(-1)">
                <i data-lucide="chevron-left" class="size-4"></i>
            </button>

            <input type="date" id="dateFilter" class="form-control border-primary fw-bold text-center text-primary" style="width: 150px;" onchange="window.loadEvidence()">
            
            <button class="btn btn-outline-secondary bg-white shadow-sm" onclick="window.changeDate(1)">
                <i data-lucide="chevron-right" class="size-4"></i>
            </button>
            
            <div class="input-group shadow-sm ms-md-2" style="width: 250px;">
                <span class="input-group-text bg-white border-primary border-end-0"><i data-lucide="search" class="size-4 text-primary"></i></span>
                <input type="text" id="searchFilter" class="form-control border-primary border-start-0 ps-0 fw-bold" placeholder="Search Case / Client..." onkeyup="window.loadEvidence()">
            </div>
        </div>
    </div>

    <div id="evidenceList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2 fw-bold">Loading logs...</p>
        </div>
    </div>
</div>

<div class="modal fade" id="imageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-header border-0 p-0 mb-2">
                <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0 text-center">
                <img id="modalFullImage" src="" class="img-fluid rounded shadow-lg" style="max-height: 80vh;">
                <div class="bg-white p-3 rounded-bottom mt-0 text-start shadow">
                    <h5 class="fw-bold mb-2 text-dark" id="modalCaseInfo">-</h5>
                    <h6 class="fw-bold mb-1 text-primary" id="modalStaffName">-</h6>
                    <div class="d-flex justify-content-between text-muted small">
                        <span id="modalTime" class="fw-bold">-</span>
                        <span id="modalLocation">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    import { firebaseConfig } from "./firebase-config.js";
    import { requireAdmin } from "./auth-guard.js";
    
    import { initEvidenceGalleryApp } from "./evidence-gallery-app.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🟢 完美保留了你的 Auth 回调结构，不影响其他页面！
    requireAdmin(app, db, async (user) => {
        await initEvidenceGalleryApp();
    });
</script>
</body>
</html>
