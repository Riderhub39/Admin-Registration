<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Manager - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div id="statusMessage"></div>

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
</div>

<div id="header-placeholder"></div>

<div id="mainContainer" class="container py-4 d-none" style="max-width: 600px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold m-0 text-dark">Holiday Manager</h5>
        <a href="schedule_planner.html" class="btn btn-sm btn-outline-secondary fw-bold">
            <i data-lucide="arrow-left" class="size-4 me-1"></i> Back to Schedule
        </a>
    </div>

    <div class="card mb-4 shadow-sm border-0">
        <div class="card-body p-4">
            <h6 class="fw-bold mb-3 text-dark">Add New Holiday</h6>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Holiday Name</label>
                <input type="text" id="hName" class="form-control border-primary text-primary fw-bold" placeholder="e.g. Labour Day">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Date</label>
                <input type="date" id="hDate" class="form-control border-primary fw-bold text-dark">
            </div>
            <button onclick="window.addHoliday()" class="btn btn-primary w-100 fw-bold shadow-sm">
                <i data-lucide="plus" class="size-4 me-1"></i> Add to Calendar
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 border-bottom border-light">
            <h6 class="fw-bold m-0 text-primary"><i data-lucide="calendar-heart" class="size-4 me-2"></i>Active Holiday List</h6>
        </div>
        <div class="card-body p-0">
            <div id="holidayList" class="list-group list-group-flush">
                <div class="text-center text-muted py-4 small">Loading...</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    import { firebaseConfig } from "./firebase-config.js";
    import { requireAdmin } from "./auth-guard.js";
    import { initHolidayApp } from "./holiday-app.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    requireAdmin(app, db, async (user) => {
        await initHolidayApp();
    });
</script>
</body>
</html>
