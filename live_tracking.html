<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking - FieldTrack Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet" type="text/css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map { width: 100%; height: 100%; }
    </style>
</head>

<body class="tracking-page-body">

<div id="statusMessage"></div>

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 class="fw-bold text-dark" id="loadingText">Verifying Access...</h5>
</div>

<div id="header-placeholder"></div>

<div id="mainContainer" class="d-none w-100 flex-grow-1 d-flex">
    
    <div class="tracking-sidebar">
        <div class="p-3 border-bottom bg-white">
            <div class="d-flex align-items-center gap-2 mb-3">
                <h6 class="fw-bold m-0 text-primary">Live Tracking</h6>
            </div>
            <div class="mb-2">
                <input type="date" id="datePicker" class="form-control form-control-sm border-primary">
            </div>
            <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search staff...">
        </div>
        <div id="driverList" class="flex-grow-1 overflow-auto">
            <div class="text-center text-muted small py-4">Loading data...</div>
        </div>
    </div>

    <div class="tracking-map-container">
        <div id="map"></div>
        
        <div id="statusOverlay" class="map-status-card p-3 d-none">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <div class="small text-muted" style="font-size: 10px;">CURRENTLY VIEWING</div>
                    <h6 class="fw-bold m-0 text-dark" id="overlayName">-</h6>
                </div>
                <span class="badge bg-primary" id="overlayStatusTag">Tracking</span>
            </div>
            <div class="d-flex align-items-center gap-2 mb-3">
                <div class="bg-light rounded p-2 flex-fill text-center border">
                    <div class="small text-muted" style="font-size: 10px;">SPEED</div>
                    <div class="fw-bold text-dark"><span id="overlaySpeed">0</span> <small>km/h</small></div>
                </div>
                <div class="bg-light rounded p-2 flex-fill text-center border">
                    <div class="small text-muted" style="font-size: 10px;">LAST UPDATE</div>
                    <div class="fw-bold text-dark" id="overlayTime">-</div>
                </div>
            </div>
            <button class="btn btn-primary w-100 btn-sm fw-bold" onclick="window.focusOnDriver()">
                <i data-lucide="crosshair" class="size-4 me-2"></i> Focus Location
            </button>
        </div>
    </div>

</div>

<script>
    window.initMap = function() {
        console.log("Google Maps API loaded.");
        // 具体地图构建由模块中的 initLiveTrackingApp 完成
    };
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAjzPJ-_ZAVl56i3cW3EU4yAyi_WjzdEfk&libraries=geometry&callback=initMap&loading=async" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";
    import { requireAdmin } from "./auth-guard.js";
    
    import { initLiveTrackingApp } from "./live-tracking-app.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    requireAdmin(app, db, async (user) => {
        await initLiveTrackingApp(); 
    });
</script>
</body>
</html>
